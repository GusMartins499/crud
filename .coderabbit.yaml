# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en"

early_access: false

reviews:
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - "!**/*.xml"
  path_instructions:
    - path: "**/*.js"
      instructions: "Review the JavaScript code for conformity with the Google JavaScript style guide, highlighting any deviations."
    - path: "**/*.ts"
      instructions: |
        Review the TypeScript code for conformity with best practices, highlighting any deviations. Ensure that:
        - The code adheres to best practices associated with Node.js.
        - The code adheres to best practices recommended for performance.
        - The code adheres to similar naming conventions for controllers, models, services, methods, variables.
        - Never allows `any`. It weakens type safety. Avoid `as` unless there is no other option.
        - Unused variables should not exist. If you must declare one, prefix it with `_` to signal intent.
        - Use string literals instead of concatenation. This avoids brittle code and improves readability.
        - Avoid abbreviations. Names should be descriptive, not cryptic.
        - Use early returns instead of long if-else chains. They cut through clutter.
        - Prefer object lookups (hash maps) over switch statements for clarity and extensibility.
  auto_review:
    enabled: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
    drafts: false
    base_branches:
      - "master"
      - "main"

chat:
  auto_reply: true